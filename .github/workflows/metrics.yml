name: Metrics

on:
  schedule:
    - cron: "0 0 * * 1"   # mỗi thứ 2 00:00 UTC (07:00 VN)
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Xbisme
          template: classic
          base: header, activity, repositories
          config_timezone: Asia/Ho_Chi_Minh
          debug: yes
          verify: yes
          retries: 3
          retries_delay: 300

          # % ngôn ngữ theo code thực tế
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less, makefile, dockerfile, shell
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15

          # Khung giờ commit, ngày trong tuần
          # plugin_habits bị bug ở v3.34 (TypeError: author undefined) — đã disable
          plugin_habits: no

          # Top starred repos
          plugin_stars: yes
          plugin_stars_limit: 4
